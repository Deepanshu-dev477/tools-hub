<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Tools Directory 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #fafaf9;
            --surface: #ffffff;
            --surface2: #f4f3f0;
            --border: rgba(0, 0, 0, 0.08);
            --border-strong: rgba(0, 0, 0, 0.16);
            --text: #111110;
            --text2: #52524e;
            --text3: #8c8c87;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-pill: 100px;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        /* ── Hero ── */
        .hero {
            padding: 3.5rem 0 2.5rem;
            border-bottom: 1px solid var(--border);
        }

        .hero-eyebrow {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 1rem;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(26px, 4vw, 50px);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: .75rem;
        }

        .hero-title .slash {
            color: var(--text3);
            font-weight: 400;
            margin: 0 .2em;
        }

        .hero-meta {
            font-size: 14px;
            color: var(--text3);
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            background: #e8f5e9;
            color: #2e7d32;
            letter-spacing: .02em;
        }

        .dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text3);
        }

        /* ── Controls ── */
        .controls {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .search-wrap {
            position: relative;
            max-width: 480px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            pointer-events: none;
            display: flex;
        }

        .search-icon svg {
            width: 16px;
            height: 16px;
        }

        #dir-search {
            width: 100%;
            height: 40px;
            padding: 0 14px 0 38px;
            font-family: var(--font-body);
            font-size: 14px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        #dir-search::placeholder {
            color: var(--text3);
        }

        #dir-search:focus {
            border-color: #555;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, .06);
        }

        .filter-group {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text3);
            min-width: 64px;
            flex-shrink: 0;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .chip {
            height: 30px;
            padding: 0 13px;
            border-radius: var(--radius-pill);
            font-size: 12.5px;
            font-family: var(--font-body);
            font-weight: 400;
            border: 1px solid var(--border-strong);
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            transition: all .12s;
            white-space: nowrap;
        }

        .chip:hover {
            background: var(--surface2);
            color: var(--text);
            border-color: #999;
        }

        .chip.on {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }

        /* ── Results bar ── */
        .results-bar {
            padding: 1rem 0 .75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.25rem;
        }

        .results-count {
            font-size: 13px;
            color: var(--text3);
        }

        .results-count b {
            color: var(--text2);
            font-weight: 500;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        /* ── Card ── */
        .card {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: inherit;
            transition: border-color .14s, transform .14s, box-shadow .14s;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(0, 0, 0, .22);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .07), 0 1px 4px rgba(0, 0, 0, .05);
        }

        .card:active {
            transform: translateY(0);
        }

        /* icon strip */
        .card-icon-wrap {
            width: 100%;
            padding: 16px 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .card-icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            display: block;
        }

        .card-icon .icon-letter {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 800;
            color: var(--text2);
            line-height: 1;
        }

        .card-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        /* pill colors */
        .pill {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            letter-spacing: .03em;
            text-transform: uppercase;
        }

        .p-uxui {
            background: #ede9fe;
            color: #5b21b6;
        }

        .p-animation {
            background: #fff1e6;
            color: #c2410c;
        }

        .p-cssjava {
            background: #d1fae5;
            color: #065f46;
        }

        .p-colours {
            background: #ecfdf5;
            color: #065f46;
        }

        .p-typography {
            background: #fce7f3;
            color: #9d174d;
        }

        .p-inspiration {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .p-education {
            background: #fef3c7;
            color: #92400e;
        }

        .p-stocks {
            background: #f5f5f4;
            color: #44403c;
        }

        .p-flexbox {
            background: #f0fdf4;
            color: #15803d;
        }

        .p-cssgrid {
            background: #f7fee7;
            color: #3f6212;
        }

        .p-logo {
            background: #ede9fe;
            color: #6d28d9;
        }

        .p-cms {
            background: #fff7ed;
            color: #c2410c;
        }

        .p-other {
            background: #f5f5f4;
            color: #57534e;
        }

        .card-body {
            padding: 10px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .card-name {
            font-family: var(--font-display);
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            letter-spacing: -.01em;
        }

        .card-sub {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.5;
            flex: 1;
            font-weight: 300;
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            font-weight: 500;
            color: var(--text3);
            letter-spacing: .02em;
            text-transform: uppercase;
        }

        .card-footer svg {
            width: 10px;
            height: 10px;
            flex-shrink: 0;
        }

        /* ── Empty ── */
        .empty {
            grid-column: 1 / -1;
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text3);
        }

        .empty strong {
            display: block;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: var(--text2);
            margin-bottom: .5rem;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            .page {
                padding: 0 1rem 3rem;
            }

            .hero {
                padding: 2rem 0 1.75rem;
            }

            .filter-group {
                flex-direction: column;
                gap: .5rem;
            }
        }
    </style>
</head>

        <div class="grid" id="dir-grid"></div>

        ];

        const PILL_ORDER = ["uxui", "animation", "colours", "typography", "inspiration", "cssjava", "education", "flexbox", "cssgrid", "logo", "cms", "stocks", "other"];
        const PILL_LABELS = { uxui: "UX/UI", animation: "Animation", colours: "Colours", typography: "Typography", inspiration: "Inspiration", cssjava: "CSS/JS", education: "Education", flexbox: "Flexbox", cssgrid: "Grid", logo: "Logo", cms: "CMS", stocks: "Assets", other: "Other" };

        let activeCat = "all", activeSub = "all", query = "";

        function getInitial(name) { return name.trim()[0].toUpperCase(); }

        function makeIcon(tool) {
            if (tool.favicon) {
                return `<img src="${tool.favicon}" alt="" onerror="this.parentNode.innerHTML='<span class=icon-letter>${getInitial(tool.name)}</span>'" loading="lazy">`;
            }
            return `<span class="icon-letter">${getInitial(tool.name)}</span>`;
        }

        function makePills(tool) {
            return tool.subs
                .filter(s => PILL_ORDER.includes(s))
                .sort((a, b) => PILL_ORDER.indexOf(a) - PILL_ORDER.indexOf(b))
                .slice(0, 2)
                .map(s => `<span class="pill p-${s}">${PILL_LABELS[s]}</span>`)
                .join("");
        }

        function render() {
            const q = query.toLowerCase();
            const filtered = TOOLS.filter(t => {
                const catOk = activeCat === "all" || t.cats.includes(activeCat);
                const subOk = activeSub === "all" || t.subs.includes(activeSub);
                const qOk = !q || t.name.toLowerCase().includes(q) || t.sub.toLowerCase().includes(q);
                return catOk && subOk && qOk;
            });
            document.getElementById("dir-count").innerHTML = `<b>${filtered.length}</b> tool${filtered.length !== 1 ? "s" : ""}`;
            const grid = document.getElementById("dir-grid");
            if (!filtered.length) {
                grid.innerHTML = `<div class="empty"><strong>No results</strong>Try different filters or a shorter search</div>`;
                return;
            }
            grid.innerHTML = filtered.map(t => `
<a class="card" href="${t.url}" target="_blank" rel="noopener">
  <div class="card-icon-wrap">
    <div class="card-icon">${makeIcon(t)}</div>
    <div class="card-pills">${makePills(t)}</div>
  </div>
  <div class="card-body">
    <div class="card-name">${t.name}</div>
    <div class="card-sub">${t.sub}</div>
    <div class="card-footer">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10L10 2M4 2h6v6"/></svg>
      Visit
    </div>
  </div>
</a>`).join("");
        }

        document.getElementById("dir-search").addEventListener("input", e => { query = e.target.value; render(); });
        document.getElementById("catRow").addEventListener("click", e => {
            const b = e.target.closest("[data-cat]"); if (!b) return;
            activeCat = b.dataset.cat;
            document.querySelectorAll("#catRow .chip").forEach(c => c.classList.toggle("on", c.dataset.cat === activeCat));
            render();
        });
        document.getElementById("subRow").addEventListener("click", e => {
            const b = e.target.closest("[data-sub]"); if (!b) return;
            activeSub = b.dataset.sub;
            document.querySelectorAll("#subRow .chip").forEach(c => c.classList.toggle("on", c.dataset.sub === activeSub));
            render();
        });

        render();
    </script>
